<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missile Launcher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="control-panel">
            <input id="num-display" placeholder="0" readonly>
            <div class="btn-container">
                <button class="key-btn">7</button>
                <button class="key-btn">8</button>
                <button class="key-btn">9</button>
                <button class="key-btn">4</button>
                <button class="key-btn">5</button>
                <button class="key-btn">6</button>
                <button class="key-btn">1</button>
                <button class="key-btn">2</button>
                <button class="key-btn">3</button>
                <button class="key-btn btn-zero">0</button>
            </div>
            <button class="launcher-btn" id="launch">Launch</button>
            <p id="display-validation">Result Code Confirmation</p>
            <div class="time-display">
                Time <span id="counter">--</span>
            </div>
        </div>
        <div class="rocket-panel">
            <div class="rocket-container" id="rocket">
                <svg class="rocket-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="70,180 20,260 70,240" fill="#d32f2f" />
                    <polygon points="130,180 180,260 130,240" fill="#d32f2f" />
                    <polygon points="95,200 105,200 105,265 95,265" fill="#b71c1c" />
                    <polygon points="80,240 120,240 125,260 75,260" fill="#455a64" />
                    <rect x="70" y="100" width="60" height="140" fill="#eceff1" />
                    <path d="M 100,20 Q 130,50 130,100 L 70,100 Q 70,50 100,20 Z" fill="#d32f2f" />
                    <rect x="100" y="100" width="30" height="140" fill="#cfd8dc" opacity="0.5" />
                    <path d="M 100,20 Q 130,50 130,100 L 100,100 Z" fill="#b71c1c" opacity="0.5" />
                    <circle cx="100" cy="130" r="18" fill="#78909c" />
                    <circle cx="100" cy="130" r="14" fill="#81d4fa" />
                    <path d="M 90,120 Q 100,115 110,120 Q 100,125 90,120 Z" fill="#ffffff" opacity="0.7" />
                </svg>
            </div>
        </div>
    </div>

    <script>
        const displayBox = document.getElementById('num-display');
        const keys = document.querySelectorAll('.key-btn');
        const launchBtn = document.getElementById('launch');
        const validationText = document.getElementById('display-validation');
        const timeCounter = document.getElementById('counter');
        const rocket = document.getElementById('rocket');

        const SECRET_CODE = "5885";
        let countdownInterval;
        let isLaunching = false;

        keys.forEach(key => {
            key.addEventListener('click', () => {
                if (isLaunching) return;

                if (displayBox.value.length < 4) {
                    displayBox.value += key.innerText;
                    validationText.innerText = "Enter 4-digit Authorization Code";
                    validationText.style.color = "#546e7a";
                }
            });
        });

        launchBtn.addEventListener('click', () => {
            if (isLaunching) return;

            const enteredCode = displayBox.value;

            if (enteredCode === SECRET_CODE) {
                startValidLaunch();
            } else {
                denyLaunch();
            }
        });

        function startValidLaunch() {
            isLaunching = true;
            launchBtn.disabled = true;

            validationText.innerText = "CODE ACCEPTED. PREPARING...";
            validationText.style.color = "#2e7d32";

            let seconds = 3;
            timeCounter.innerText = seconds;

            countdownInterval = setInterval(() => {
                seconds--;
                timeCounter.innerText = seconds;

                if (seconds === 0) {
                    clearInterval(countdownInterval);
                    triggerLiftoff();
                }
            }, 1000);
        }

        function denyLaunch() {
            validationText.innerText = "INVALID CODE - ACCESS DENIED";
            validationText.style.color = "#d32f2f";

            displayBox.style.border = "3px solid #d32f2f";

            setTimeout(() => {
                displayBox.value = "";
                displayBox.style.border = "3px solid #546e7a";
            }, 1000);
        }

        function triggerLiftoff() {
            validationText.innerText = "IGNITION... LIFTOFF!";
            rocket.classList.add('launched');

            setTimeout(() => {
                rocket.classList.remove('launched');
                displayBox.value = "";
                timeCounter.innerText = "--";
                validationText.innerText = "System Ready. Enter Code.";
                validationText.style.color = "#546e7a";
                launchBtn.disabled = false;
                isLaunching = false;
            }, 3000);
        }
    </script>
</body>

</html>
